<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONVMWEB | Solusi Digital Batang</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #38bdf8; --dark-bg: #0f172a; --card-bg: #1e293b; --text-main: #f8fafc; --text-dim: #94a3b8; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background-color: var(--dark-bg); color: var(--text-main); scroll-behavior: smooth; line-height: 1.6; }

        /* NAVBAR MOBILE FRIENDLY */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 8%; background: rgba(15, 23, 42, 0.95); position: fixed; width: 100%; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .logo { font-weight: 800; font-size: 1.5rem; text-decoration: none; color: white; }
        .logo span { color: var(--primary); }
        
        .nav-links { display: flex; gap: 20px; }
        .nav-links a { color: var(--text-main); text-decoration: none; font-weight: 500; font-size: 0.9rem; }
        .menu-toggle { display: none; font-size: 1.5rem; color: white; cursor: pointer; }

        @media (max-width: 768px) {
            .nav-links { display: none; flex-direction: column; position: absolute; top: 100%; left: 0; width: 100%; background: var(--card-bg); padding: 20px; text-align: center; border-bottom: 1px solid var(--primary); }
            .nav-links.active { display: flex; }
            .menu-toggle { display: block; }
        }

        .hero { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 120px 5% 60px; background: radial-gradient(circle at center, rgba(56, 189, 248, 0.15) 0%, transparent 70%); }
        .hero h1 { font-size: clamp(2rem, 8vw, 4rem); font-weight: 800; margin-bottom: 20px; }
        .hero h1 span { color: var(--primary); }

        .contact-wrap { padding: 80px 8%; }
        .contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
        @media (max-width: 768px) { .contact-grid { grid-template-columns: 1fr; } }

        /* MAPS STYLING */
        .map-box { height: 400px; border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
        iframe { width: 100%; height: 100%; border: 0; filter: grayscale(1) invert(1); }
    </style>
</head>
<body>

    <nav>
        <a href="./" class="logo">ONVM<span>WEB.</span></a>
        <div class="menu-toggle" onclick="document.querySelector('.nav-links').classList.toggle('active')">
            <i class="fas fa-bars"></i>
        </div>
        <div class="nav-links">
            <a href="./">Home</a>
            <a href="layanan.html">Layanan</a>
            <a href="#kontak">Hubungi Kami</a>
        </div>
    </nav>

    <header class="hero">
        <h1>Bawa Bisnis Anda ke <span>Level Digital</span></h1>
        <p style="color: var(--text-dim); max-width: 600px; margin-bottom: 30px;">Solusi website mewah untuk UMKM di wilayah Subah dan sekitarnya.</p>
        <a href="https://wa.me/62818657329" style="background: var(--primary); color: var(--dark-bg); padding: 15px 30px; border-radius: 10px; text-decoration: none; font-weight: bold;">Mulai Sekarang</a>
    </header>

    <section id="kontak" class="contact-wrap">
        <div class="contact-grid">
            <div>
                <h2 style="font-size: 2rem; margin-bottom: 20px;">Lokasi <span>Kami</span></h2>
                <p style="color: var(--text-dim); margin-bottom: 10px;">Pagersari, Karangtengah, Subah,</p>
                <p style="color: var(--text-dim); margin-bottom: 30px;">Kabupaten Batang, Jawa Tengah 51262</p>
                <p><i class="fab fa-whatsapp"></i> 0818-657-329</p>
            </div>
            <div class="map-box">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3960.334057885418!2d109.89418067425418!3d-6.969854768243684!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x2e702db0ac53f5f3%3A0x9ffdb7402be3a6a8!2sKarangtengah%2C%20Kec.%20Subah%2C%20Kabupaten%20Batang%2C%20Jawa%20Tengah!5e0!3m2!1sid!2sid!4v1713580000000!5m2!1sid!2sid" allowfullscreen="" loading="lazy"></iframe>
            </div>
        </div>
    </section>

</body>
</html>
